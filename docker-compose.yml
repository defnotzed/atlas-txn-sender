services:
  app:
    build: .
    ports:
      - "4040:4040"
    volumes:
      - .:/app
    environment:
      - RPC_URL=${RPC_URL}
      - GRPC_URL=https://grpc-takehome-devnet.helius-rpc.com:443
      - X_TOKEN=${X_TOKEN}
      - TPU_CONNECTION_POOL_SIZE=4
      - NUM_LEADERS=5
      - LEADER_OFFSET=0
      - PORT=4040